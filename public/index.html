<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libas & Co. — Premium Clothing</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Jost:wght@300;400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b8860b;
  --gold-light: #d4a030;
  --gold-pale: #f5e8c0;
  --gold-ultra: #fdf8ee;
  --black: #0a0a0a;
  --charcoal: #1a1a1a;
  --grey: #6b6b6b;
  --grey-light: #d4d4d4;
  --grey-ultra: #f8f8f8;
  --white: #ffffff;
  --cream: #fdfcf9;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--black);overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:24px 64px;display:flex;align-items:center;justify-content:space-between;background:rgba(253,252,249,0.95);backdrop-filter:blur(12px);}
nav::after{content:'';position:absolute;bottom:0;left:64px;right:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);opacity:0.4;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--black);text-decoration:none;letter-spacing:2px;}
.nav-brand em{font-style:italic;color:var(--gold);}
.nav-links{display:flex;gap:40px;list-style:none;align-items:center;}
.nav-links a{font-size:11px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{border:1px solid var(--gold) !important;color:var(--gold) !important;padding:10px 24px;letter-spacing:3px;cursor:pointer;background:transparent;}
.nav-cta:hover{background:var(--gold) !important;color:var(--white) !important;}
#cartCount{position:absolute;top:-8px;right:-8px;background:var(--gold);color:var(--white);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 64px 80px;text-align:center;position:relative;overflow:hidden;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,8vw,110px);font-weight:300;line-height:0.95;color:var(--black);margin-bottom:8px;letter-spacing:-2px;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-desc{font-size:14px;font-weight:300;line-height:1.9;color:var(--grey);max-width:480px;margin:0 auto 48px;}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.btn-gold{background:var(--gold);color:var(--white);padding:16px 40px;font-family:'Jost',sans-serif;font-size:10px;font-weight:400;letter-spacing:4px;text-transform:uppercase;text-decoration:none;border:1px solid var(--gold);cursor:pointer;transition:all 0.3s;}
.btn-gold:hover{background:transparent;color:var(--gold);}
.btn-outline{background:transparent;color:var(--black);padding:16px 40px;font-family:'Jost',sans-serif;font-size:10px;font-weight:400;letter-spacing:4px;text-transform:uppercase;text-decoration:none;border:1px solid var(--grey-light);cursor:pointer;transition:all 0.3s;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

.section{padding:100px 64px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4vw,60px);font-weight:300;text-align:center;color:var(--black);margin-bottom:14px;line-height:1.1;}
.section-title em{font-style:italic;color:var(--gold);}

.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grey-light);margin-bottom:40px;}
.product-card{background:var(--white);overflow:hidden;transition:all 0.3s;position:relative;}
.product-card:hover{z-index:2;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
.product-img{height:240px;background:var(--grey-ultra);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.product-img img{width:100%;height:100%;object-fit:cover;}
.product-label{position:absolute;top:16px;left:16px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;padding:5px 12px;text-transform:uppercase;}
.product-label.new{background:var(--black);color:var(--white);}
.product-label.sale{background:var(--gold);color:var(--white);}
.product-info{padding:24px 20px;}
.product-cat{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace;}
.product-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--black);margin-bottom:10px;}
.product-price{font-size:13px;font-weight:400;color:var(--black);}
.product-price del{color:var(--grey-light);margin-left:8px;font-size:11px;text-decoration:line-through;}
.product-line{width:0;height:1px;background:var(--gold);transition:width 0.4s;margin-top:16px;}
.product-card:hover .product-line{width:100%;}
.quick-view-btn{width:100%;padding:10px;background:var(--gold);color:var(--white);border:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:12px;transition:background 0.3s;}
.quick-view-btn:hover{background:var(--gold-light);}

.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;}
.panel-overlay.open{display:block;}
.side-panel{position:fixed;right:0;top:0;width:400px;height:100vh;background:var(--white);z-index:201;transform:translateX(400px);transition:transform 0.3s;overflow-y:auto;}
.side-panel.open{transform:translateX(0);}
.panel-header{padding:24px;border-bottom:1px solid var(--grey-light);display:flex;justify-content:space-between;align-items:center;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--black);}
.panel-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--grey);}
.panel-body{padding:24px;}
.product-detail-img{width:100%;height:240px;background:var(--grey-ultra);margin-bottom:24px;border-radius:4px;overflow:hidden;}
.product-detail-img img{width:100%;height:100%;object-fit:cover;}
.detail-price{font-size:24px;font-weight:600;color:var(--black);margin-bottom:8px;}
.detail-price del{color:var(--grey-light);font-size:16px;margin-left:12px;}
.detail-cat{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:16px;}
.size-selector{margin:24px 0;}
.size-label{font-size:12px;font-weight:600;color:var(--black);margin-bottom:12px;display:block;letter-spacing:1px;text-transform:uppercase;}
.size-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
.size-btn{padding:10px;border:1px solid var(--grey-light);background:var(--white);color:var(--black);cursor:pointer;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;}
.size-btn:hover{border-color:var(--gold);color:var(--gold);}
.size-btn.active{background:var(--gold);color:var(--white);border-color:var(--gold);}
.qty-control{display:flex;align-items:center;gap:12px;margin:24px 0;}
.qty-btn{width:40px;height:40px;border:1px solid var(--grey-light);background:var(--white);cursor:pointer;font-size:14px;font-weight:600;transition:all 0.3s;}
.qty-btn:hover{border-color:var(--gold);color:var(--gold);}
#qtyNum{font-size:14px;font-weight:600;min-width:30px;text-align:center;}
.action-buttons{display:flex;flex-direction:column;gap:12px;margin-top:24px;}
.btn-full{width:100%;padding:14px;background:var(--gold);color:var(--white);border:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.3s;font-weight:600;}
.btn-full:hover{background:var(--gold-light);}
.btn-full.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.btn-full.secondary:hover{background:var(--gold-ultra);}

.cart-drawer{position:fixed;right:0;bottom:0;width:400px;max-height:600px;background:var(--white);z-index:210;transform:translateX(400px);transition:transform 0.3s;overflow-y:auto;border-top:1px solid var(--grey-light);border-left:1px solid var(--grey-light);}
.cart-drawer.open{transform:translateX(0);}
.cart-header{padding:20px 24px;border-bottom:1px solid var(--grey-light);display:flex;justify-content:space-between;align-items:center;}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;}
.cart-items{padding:20px 24px;}
.cart-empty{text-align:center;padding:40px 24px;color:var(--grey);}
.cart-empty-icon{font-size:48px;margin-bottom:16px;}
.cart-item{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--grey-light);}
.cart-item-info{flex:1;}
.cart-item-name{font-weight:600;color:var(--black);font-size:13px;}
.cart-item-meta{font-size:11px;color:var(--grey);margin:4px 0;}
.cart-item-price{font-weight:600;color:var(--gold);font-size:12px;}
.cart-item-remove{background:none;border:none;color:var(--grey);cursor:pointer;font-size:18px;transition:color 0.3s;}
.cart-item-remove:hover{color:var(--black);}
#cartFooter{padding:20px 24px;border-top:1px solid var(--grey-light);}
.cart-total{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;}
.checkout-btn{width:100%;padding:14px;background:var(--gold);color:var(--white);border:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:600;}
.checkout-btn:hover{background:var(--gold-light);}

.category-filter{display:flex;gap:12px;justify-content:center;margin:40px 0;flex-wrap:wrap;}
.filter-btn{padding:10px 24px;border:1px solid var(--grey-light);background:var(--white);color:var(--black);cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:all 0.3s;}
.filter-btn.active{background:var(--gold);color:var(--white);border-color:var(--gold);}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}

.loading{text-align:center;padding:60px 24px;color:var(--grey);}

@media (max-width: 1024px) {
  .product-grid{grid-template-columns:repeat(3,1fr);}
  nav{padding:16px 32px;}
  .section{padding:80px 32px;}
}

@media (max-width: 768px) {
  .product-grid{grid-template-columns:repeat(2,1fr);}
  nav{padding:12px 20px;}
  .nav-brand{font-size:18px;}
  .nav-links{gap:20px;}
  .side-panel, .cart-drawer{width:100%;right:0;transform:translateX(100%);}
  .side-panel.open, .cart-drawer.open{transform:translateX(0);}
  .section{padding:60px 20px;}
  .hero{padding:100px 20px 60px;}
}

@media (max-width: 480px) {
  .product-grid{grid-template-columns:1fr;}
  nav{padding:10px 16px;}
  .nav-links{display:none;}
  .nav-brand{font-size:16px;}
  .section{padding:40px 16px;}
}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-brand">Libas <em>& Co.</em></a>
  <div style="position:relative;cursor:pointer;font-size:16px;" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</nav>

<div class="hero">
  <h1 class="hero-title">Premium <em>Clothing</em></h1>
  <p class="hero-desc">Curated collections for every occasion. Timeless elegance meets contemporary style.</p>
  <div class="hero-btns">
    <button class="btn-gold" onclick="scrollToProducts()">Explore Collection</button>
  </div>
</div>

<div class="category-filter" id="categoryFilter"></div>

<div class="section" style="background:var(--grey-ultra);">
  <h2 class="section-title">Featured <em>Products</em></h2>
  <div id="productsContainer" class="product-grid">
    <div class="loading">Loading products...</div>
  </div>
</div>

<div id="panelOverlay" class="panel-overlay" onclick="closePanel()"></div>
<div id="sidePanel" class="side-panel">
  <div class="panel-header">
    <div class="panel-title" id="panelProductName">Product</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="product-detail-img" id="panelProductImg"></div>
    <div class="detail-cat" id="panelProductCat"></div>
    <div class="detail-price" id="panelProductPrice"></div>
    
    <div class="size-selector">
      <label class="size-label">Select Size</label>
      <div class="size-buttons" id="sizeWrap"></div>
      <p style="font-size:11px;color:var(--grey);margin-top:8px;">Select a size to continue</p>
    </div>

    <div style="border-top:1px solid var(--grey-light);padding-top:20px;margin-top:20px;">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--black);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase;">Quantity</label>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span id="qtyNum">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-full" onclick="addToCart()">Add to Cart</button>
      <button class="btn-full secondary" onclick="orderNowWhatsApp()">Order via WhatsApp</button>
    </div>
  </div>
</div>

<div id="cartOverlay" class="panel-overlay" onclick="closeCart()" style="z-index:209;"></div>
<div id="cartDrawer" class="cart-drawer">
  <div class="cart-header">
    <div class="cart-title">Your Cart</div>
    <button class="panel-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div id="cartFooter" style="display:none;">
    <div class="cart-total">
      <span>Total:</span>
      <span id="cartTotal">PKR 0</span>
    </div>
    <button class="checkout-btn" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
  </div>
</div>

<script>
const API_URL = 'https://libas-admin.onrender.com/api/products';
let allProducts = [];
let cart = [];
let currentProduct = null;
let selectedSize = null;
let currentQty = 1;

async function loadProducts() {
  try {
    const res = await fetch(API_URL);
    allProducts = await res.json();
    renderProducts(allProducts);
    renderCategoryFilter();
  } catch (err) {
    document.getElementById('productsContainer').innerHTML = '<div class="loading">Failed to load products. Please refresh.</div>';
    console.error('Error:', err);
  }
}

function renderCategoryFilter() {
  const categories = ['all', 'mens', 'kids', 'festive'];
  const filterHtml = categories.map(cat => 
    `<button class="filter-btn ${cat === 'all' ? 'active' : ''}" onclick="filterByCategory('${cat}', this)">
      ${cat === 'all' ? 'All Products' : cat.charAt(0).toUpperCase() + cat.slice(1)}
    </button>`
  ).join('');
  document.getElementById('categoryFilter').innerHTML = filterHtml;
}

function filterByCategory(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const filtered = cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat);
  renderProducts(filtered);
}

function renderProducts(products) {
  const container = document.getElementById('productsContainer');
  if (products.length === 0) {
    container.innerHTML = '<div class="loading">No products found</div>';
    return;
  }

  container.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.label ? `<div class="product-label ${p.label.toLowerCase()}">${p.label}</div>` : ''}
        <img src="${p.image}" alt="${p.name}" style="cursor:pointer;" onclick="openProductPanel('${p._id}')">
      </div>
      <div class="product-info">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">
          PKR ${p.price.toLocaleString()}
          ${p.originalPrice ? `<del>PKR ${p.originalPrice.toLocaleString()}</del>` : ''}
        </div>
        <div class="product-line"></div>
        <button class="quick-view-btn" onclick="openProductPanel('${p._id}')">Quick View</button>
      </div>
    </div>
  `).join('');
}

function openProductPanel(productId) {
  currentProduct = allProducts.find(p => p._id === productId);
  if (!currentProduct) return;

  selectedSize = null;
  currentQty = 1;

  document.getElementById('panelProductName').textContent = currentProduct.name;
  document.getElementById('panelProductCat').textContent = currentProduct.category.toUpperCase();
  document.getElementById('panelProductPrice').innerHTML = 
    `PKR ${currentProduct.price.toLocaleString()}
    ${currentProduct.originalPrice ? `<del>PKR ${currentProduct.originalPrice.toLocaleString()}</del>` : ''}`;
  
  const imgDiv = document.getElementById('panelProductImg');
  imgDiv.innerHTML = `<img src="${currentProduct.image}" alt="${currentProduct.name}" style="width:100%;height:100%;object-fit:cover;">`;

  document.getElementById('qtyNum').textContent = '1';

  const sizeWrap = document.getElementById('sizeWrap');
  sizeWrap.innerHTML = '';
  currentProduct.sizes.forEach(size => {
    const btn = document.createElement('button');
    btn.className = 'size-btn';
    btn.textContent = size;
    btn.onclick = function() {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = size;
    };
    sizeWrap.appendChild(btn);
  });

  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('sidePanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('sidePanel').classList.remove('open');
  document.body.style.overflow = '';
}

function changeQty(dir) {
  currentQty = Math.max(1, currentQty + dir);
  document.getElementById('qtyNum').textContent = currentQty;
}

function addToCart() {
  if (!selectedSize) {
    alert('Please select a size!');
    return;
  }
  const existing = cart.find(i => i.name === currentProduct.name && i.size === selectedSize);
  if (existing) {
    existing.qty += currentQty;
  } else {
    cart.push({
      _id: currentProduct._id,
      name: currentProduct.name,
      cat: currentProduct.category,
      price: `PKR ${currentProduct.price.toLocaleString()}`,
      priceNum: currentProduct.price,
      size: selectedSize,
      qty: currentQty
    });
  }
  updateCartCount();
  closePanel();
  openCart();
}

function orderNowWhatsApp() {
  if (!selectedSize) { 
    alert('Please select a size!'); 
    return; 
  }
  const msg = `🛍️ *Libas & Co. — Quick Order*\n\n👗 *Product:* ${currentProduct.name}\n📦 *Category:* ${currentProduct.category}\n💰 *Price:* PKR ${currentProduct.price.toLocaleString()}\n📏 *Size:* ${selectedSize}\n🔢 *Quantity:* ${currentQty}\n\n_Sent via Libas & Co. Website_`;
  closePanel();
  window.open(`https://wa.me/923104508143?text=${encodeURIComponent(msg)}`,'_blank');
}

function updateCartCount() {
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">Your cart is empty</div></div>';
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';
  let total = 0;
  container.innerHTML = cart.map((item, idx) => {
    total += item.priceNum * item.qty;
    return `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-meta">${item.cat} · Size: ${item.size} · Qty: ${item.qty}</div>
          <div class="cart-item-price">PKR ${(item.priceNum * item.qty).toLocaleString()}</div>
        </div>
        <button class="cart-item-remove" onclick="removeItem(${idx})">✕</button>
      </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = `PKR ${total.toLocaleString()}`;
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function checkoutWhatsApp() {
  if (cart.length === 0) return;
  let msg = `🛍️ *Libas & Co. — Cart Order*\n\n`;
  let total = 0;
  cart.forEach((item, i) => {
    msg += `*${i+1}. ${item.name}*\n`;
    msg += `   Category: ${item.cat}\n`;
    msg += `   Size: ${item.size} · Qty: ${item.qty}\n`;
    msg += `   Price: PKR ${(item.priceNum * item.qty).toLocaleString()}\n\n`;
    total += item.priceNum * item.qty;
  });
  msg += `*Total: PKR ${total.toLocaleString()}*\n\n_Sent via Libas & Co. Website_`;
  closeCart();
  window.open(`https://wa.me/923104508143?text=${encodeURIComponent(msg)}`,'_blank');
}

function scrollToProducts() {
  document.querySelector('.category-filter').scrollIntoView({ behavior: 'smooth' });
}

loadProducts();
</script>

</body>
</html>
